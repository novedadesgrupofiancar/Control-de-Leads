<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Gestión de Leads</title>
<style>
  :root{
    --bg: #12151A;
    --surface: #1B1F25;
    --surface-2: #242A31;
    --surface-3: #2C333B;
    --border: #333B44;
    --text: #E8EAED;
    --text-dim: #8D94A0;
    --text-faint: #5C636D;
    --red: #E5484D;
    --red-bg: rgba(229,72,77,0.14);
    --amber: #F2A93B;
    --amber-bg: rgba(242,169,59,0.14);
    --green: #35D68C;
    --green-bg: rgba(53,214,140,0.14);
    --blue: #5B9DF9;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", monospace;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family: var(--font-body);
    padding: 24px;
    min-height:100vh;
  }
  .wrap{ max-width: 1100px; margin: 0 auto; }
  header{ margin-bottom:20px; }
  header h1{ font-size:22px; font-weight:700; margin:0 0 4px 0; letter-spacing:-0.02em; }
  header p{ margin:0; color:var(--text-dim); font-size:13.5px; }

  .tabs{ display:flex; flex-wrap:wrap; gap:6px; margin: 18px 0 16px 0; align-items:center; }
  .tab{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    padding:7px 14px; border-radius:20px; font-size:13px; cursor:pointer; font-weight:600;
    transition: all .15s ease; white-space:nowrap;
  }
  .tab:hover{ border-color:var(--blue); color:var(--text); }
  .tab.active{ background:var(--blue); border-color:var(--blue); color:#0A0F16; }
  .tab.team{ background:var(--surface-2); }
  .tab.team.active{ background:var(--green); border-color:var(--green); }
  .tab-add{
    background:transparent; border:1px dashed var(--text-faint); color:var(--text-faint);
    width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:16px; line-height:1;
  }
  .tab-add:hover{ color:var(--text); border-color:var(--text-dim); }

  .backup-bar{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:10px 16px; margin-bottom:6px;
  }
  .backup-text{ font-size:12.5px; color:var(--text-dim); }
  .backup-actions{ display:flex; gap:8px; flex-shrink:0; }
  @media (max-width: 560px){ .backup-bar{ flex-direction:column; align-items:flex-start; } }

  .grid{ display:grid; grid-template-columns: 340px 1fr; gap:16px; margin-bottom:16px; }
  @media (max-width: 760px){ .grid{ grid-template-columns: 1fr; } }

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:18px 20px;
  }
  .card h2{ font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:0 0 14px 0; font-weight:700; }
  .card .card-actions{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .card .card-actions h2{ margin:0; }

  /* GAUGE */
  .gauge-box{ display:flex; flex-direction:column; align-items:center; }
  .gauge{ position:relative; width:220px; height:120px; overflow:hidden; }
  .gauge-arc{
    position:absolute; top:0; left:0; width:220px; height:220px; border-radius:50%;
    background: conic-gradient(from 270deg,
      var(--red) 0%, var(--red) 20%,
      var(--amber) 20%, var(--amber) 35%,
      var(--green) 35%, var(--green) 50%,
      transparent 50%, transparent 100%);
    -webkit-mask: radial-gradient(circle at 50% 50%, transparent 62px, #000 63px);
    mask: radial-gradient(circle at 50% 50%, transparent 62px, #000 63px);
  }
  .gauge-needle{
    position:absolute; bottom:0; left:50%; width:4px; height:88px; margin-left:-2px;
    background:var(--text); border-radius:4px 4px 0 0;
    transform-origin: bottom center; transform: rotate(-90deg);
    transition: transform .5s cubic-bezier(.34,1.4,.64,1);
  }
  .gauge-pivot{
    position:absolute; bottom:-8px; left:50%; width:16px; height:16px; margin-left:-8px;
    background:var(--text); border-radius:50%; border:3px solid var(--surface);
  }
  .gauge-labels{ display:flex; justify-content:space-between; width:220px; font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-top:2px; }
  .gauge-score{ font-family:var(--font-mono); font-size:38px; font-weight:700; margin-top:6px; line-height:1; }
  .gauge-tag{
    margin-top:6px; font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px;
  }
  .gauge-sub{ color:var(--text-dim); font-size:12.5px; margin-top:8px; text-align:center; }
  .gauge-date-picker{ margin-top:12px; }
  .gauge-date-picker input{ width:100%; }

  /* FORMS */
  label{ display:block; font-size:12px; color:var(--text-dim); margin: 10px 0 4px 0; font-weight:600; }
  input[type=date], input[type=month], input[type=number], input[type=text]{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:9px 10px; border-radius:8px; font-size:14px; font-family:var(--font-mono);
  }
  input[type=text]{ font-family:var(--font-body); }
  input:focus{ outline:none; border-color:var(--blue); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--blue); color:#0A0F16; border:none; padding:9px 16px; border-radius:8px;
    font-size:13.5px; font-weight:700; cursor:pointer; margin-top:14px; width:100%;
    transition: filter .15s;
  }
  .btn:hover{ filter:brightness(1.1); }
  .btn.secondary{ background:var(--surface-3); color:var(--text); border:1px solid var(--border); }
  .btn.small{ width:auto; padding:6px 12px; font-size:12.5px; margin-top:0; }
  .hint{ font-size:11.5px; color:var(--text-faint); margin-top:6px; }

  /* ALERT */
  .alert{
    display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:10px;
    margin-bottom:14px; font-size:13px; border:1px solid;
  }
  .alert.warn{ background:var(--amber-bg); border-color:var(--amber); color:var(--amber); }
  .alert.ok{ background:var(--green-bg); border-color:var(--green); color:var(--green); }

  /* PENDIENTES LIST */
  .pend-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--border);
  }
  .pend-item:last-child{ border-bottom:none; }
  .pend-info{ font-size:13px; }
  .pend-info b{ font-family:var(--font-mono); color:var(--text); }
  .pend-info span{ display:block; color:var(--text-faint); font-size:11.5px; margin-top:2px; }
  .pend-form{ display:flex; gap:6px; align-items:center; }
  .pend-form input{ width:64px; padding:6px 8px; font-size:13px; }

  /* TABLE */
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; color:var(--text-faint); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:6px 8px; border-bottom:1px solid var(--border); }
  td{ padding:8px; border-bottom:1px solid var(--border); font-family:var(--font-mono); }
  td.name-col, th.name-col{ font-family:var(--font-body); }
  tr:last-child td{ border-bottom:none; }
  .score-pill{ display:inline-block; padding:2px 9px; border-radius:20px; font-weight:700; font-size:12.5px; }
  .row-actions{ display:flex; gap:6px; }
  .icon-btn{
    background:none; border:1px solid var(--border); color:var(--text-dim); cursor:pointer;
    border-radius:6px; padding:4px 7px; font-size:12px;
  }
  .icon-btn:hover{ border-color:var(--blue); color:var(--text); }
  .empty{ color:var(--text-faint); font-size:13px; padding:20px 0; text-align:center; }

  /* MONTHLY */
  .month-summary{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .month-score{ font-family:var(--font-mono); font-size:44px; font-weight:700; }
  .month-stats{ display:flex; gap:24px; flex-wrap:wrap; }
  .stat{ }
  .stat b{ display:block; font-family:var(--font-mono); font-size:20px; }
  .stat span{ color:var(--text-dim); font-size:11.5px; }

  /* TEAM VIEW */
  .team-row{ display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--border); }
  .team-row:last-child{ border-bottom:none; }
  .team-name{ width:110px; font-size:13.5px; font-weight:600; flex-shrink:0; }
  .team-bar-track{ flex:1; height:10px; background:var(--surface-2); border-radius:6px; overflow:hidden; }
  .team-bar-fill{ height:100%; border-radius:6px; transition: width .4s ease; }
  .team-score{ font-family:var(--font-mono); font-weight:700; width:42px; text-align:right; flex-shrink:0; }
  .team-note{ width:150px; font-size:11.5px; color:var(--text-dim); flex-shrink:0; }

  footer{ margin-top: 30px; text-align:center; color:var(--text-faint); font-size:11.5px; }
</style>
</head>
<body>
<div class="wrap" id="app">Cargando…</div>

<script>
const DEFAULT_AGENTS = ["Álvaro","Sabrina","Melanie","Isabel","Natasha","Piero","Shoanna","Damián"];

let state = { agents: [], currentAgent: null, data: {}, view: 'agent', teamMonth: null, agentMonth: null, gaugeDate: null };

// ---------- storage helpers (localStorage: vive en este navegador) ----------
async function storageGet(key){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch(e){ console.error('storage set failed', e); return false; }
}

// ---------- backup / restore ----------
function exportBackup(){
  const backup = { exportedAt: new Date().toISOString(), agents: state.agents, data: state.data };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup_leads_${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function triggerImport(){
  const input = document.getElementById('import-file-input');
  if(input) input.click();
}

async function handleImportFile(file){
  if(!file) return;
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup || !Array.isArray(backup.agents) || typeof backup.data !== 'object'){
      alert('El archivo no tiene el formato esperado de un backup de este tablero.');
      return;
    }
    if(!confirm('Esto reemplaza todos los datos actuales por los del backup. ¿Continuar?')) return;
    state.agents = backup.agents;
    state.data = backup.data;
    await saveAgentsList();
    for(const a of state.agents){ await saveAgentData(a); }
    state.currentAgent = state.agents[0] || null;
    state.view = 'agent';
    render();
    alert('Backup restaurado correctamente.');
  }catch(e){
    alert('No se pudo leer el archivo. Verificá que sea un backup válido exportado desde este tablero.');
  }
}

// ---------- date helpers ----------
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthStr(dateStr){ return dateStr.slice(0,7); }
function diffDaysFromToday(dateStr){
  const today = new Date(todayStr()+'T00:00:00');
  const d = new Date(dateStr+'T00:00:00');
  return Math.round((today - d) / 86400000);
}
function fmtDate(dateStr){
  const [y,m,d] = dateStr.split('-');
  return `${d}/${m}`;
}

// ---------- scoring ----------
function scoreOf(rec){
  if(!rec || !rec.entrantes) return null;
  const pts = rec.mismo_dia*10 + rec.vencido_1d*1 + rec.vencido_2d*0;
  return pts / rec.entrantes;
}
function pendientesOf(rec){
  return Math.max(0, rec.entrantes - rec.mismo_dia - rec.vencido_1d - rec.vencido_2d);
}
function scoreColor(score){
  if(score === null) return 'var(--text-faint)';
  if(score >= 7) return 'var(--green)';
  if(score >= 4) return 'var(--amber)';
  return 'var(--red)';
}
function scoreBg(score){
  if(score === null) return 'var(--surface-2)';
  if(score >= 7) return 'var(--green-bg)';
  if(score >= 4) return 'var(--amber-bg)';
  return 'var(--red-bg)';
}
function scoreLabel(score){
  if(score === null) return 'Sin datos';
  if(score >= 7) return 'En control';
  if(score >= 4) return 'Atención';
  return 'Crítico';
}

function monthlyAverage(agent, yearMonth){
  const records = state.data[agent]?.records || {};
  const scores = [];
  let totalEntrantes = 0, totalMismoDia = 0;
  for(const [fecha, rec] of Object.entries(records)){
    if(monthStr(fecha) === yearMonth && rec.entrantes > 0){
      scores.push(scoreOf(rec));
      totalEntrantes += rec.entrantes;
      totalMismoDia += rec.mismo_dia;
    }
  }
  if(scores.length === 0) return null;
  const avg = scores.reduce((a,b)=>a+b,0) / scores.length;
  return { avg, days: scores.length, totalEntrantes, totalMismoDia };
}

function totalPendientes(agent){
  const records = state.data[agent]?.records || {};
  let total = 0;
  for(const rec of Object.values(records)) total += pendientesOf(rec);
  return total;
}

// ---------- init ----------
async function init(){
  let agents = await storageGet('agents-list');
  if(!agents){ agents = DEFAULT_AGENTS.slice(); await storageSet('agents-list', agents); }
  state.agents = agents;
  for(const a of agents){
    let d = await storageGet('agent-data:' + a);
    if(!d) d = { records: {} };
    state.data[a] = d;
  }
  state.currentAgent = agents[0] || null;
  state.agentMonth = monthStr(todayStr());
  state.teamMonth = monthStr(todayStr());
  state.gaugeDate = todayStr();
  render();
}

async function saveAgentData(agent){
  await storageSet('agent-data:' + agent, state.data[agent]);
}
async function saveAgentsList(){
  await storageSet('agents-list', state.agents);
}

// ---------- actions ----------
async function addAgent(){
  const name = prompt('Nombre del agente a agregar:');
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  if(state.agents.includes(trimmed)){ alert('Ese agente ya existe.'); return; }
  state.agents.push(trimmed);
  state.data[trimmed] = { records: {} };
  await saveAgentsList();
  await saveAgentData(trimmed);
  state.currentAgent = trimmed;
  state.view = 'agent';
  render();
}

async function removeAgent(name){
  if(!confirm(`¿Eliminar a ${name}? Se pierde su historial guardado.`)) return;
  state.agents = state.agents.filter(a => a !== name);
  delete state.data[name];
  await saveAgentsList();
  if(state.currentAgent === name) state.currentAgent = state.agents[0] || null;
  render();
}

function selectAgent(name){ state.currentAgent = name; state.view = 'agent'; state.gaugeDate = todayStr(); render(); }
function selectTeamView(){ state.view = 'team'; render(); }

async function registrarHoy(agent, fecha, entrantes, mismoDia){
  const d = state.data[agent];
  const existing = d.records[fecha] || { entrantes:0, mismo_dia:0, vencido_1d:0, vencido_2d:0 };
  d.records[fecha] = {
    entrantes: entrantes,
    mismo_dia: mismoDia,
    vencido_1d: existing.vencido_1d || 0,
    vencido_2d: existing.vencido_2d || 0
  };
  await saveAgentData(agent);
  state.gaugeDate = fecha;
  render();
}

async function resolverPendiente(agent, fecha, cantidad){
  const d = state.data[agent];
  const rec = d.records[fecha];
  if(!rec) return;
  const pend = pendientesOf(rec);
  const n = Math.max(0, Math.min(cantidad, pend));
  if(n <= 0) return;
  const dd = diffDaysFromToday(fecha);
  if(dd <= 1) rec.vencido_1d += n;
  else rec.vencido_2d += n;
  await saveAgentData(agent);
  render();
}

async function deleteRecord(agent, fecha){
  if(!confirm(`¿Borrar el registro del ${fmtDate(fecha)}?`)) return;
  delete state.data[agent].records[fecha];
  await saveAgentData(agent);
  render();
}

// ---------- render ----------
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header>
      <h1>Tablero de Gestión de Leads</h1>
      <p>Puntaje por velocidad de gestión — 10 pts mismo día, 1 pt un día vencido, 0 pts más de un día vencido</p>
      <p style="margin-top:4px;">Versión para GitHub Pages · guardado local del navegador</p>
    </header>
    ${renderBackupBar()}
    ${renderTabs()}
    ${state.view === 'team' ? renderTeamView() : renderAgentView()}
    <footer>Los datos se guardan en este navegador. Si limpiás el caché o cambiás de compu, se pierden — restaurá desde tu último backup.</footer>
  `;
  attachDelegatedEvents();
}

function renderBackupBar(){
  return `
    <div class="backup-bar">
      <div class="backup-text">💾 Los datos viven en este navegador. Descargá un backup seguido para no perder el historial.</div>
      <div class="backup-actions">
        <button class="btn small secondary" data-action="export-backup">⬇ Descargar backup</button>
        <button class="btn small secondary" data-action="import-backup">⬆ Restaurar backup</button>
        <input type="file" id="import-file-input" accept="application/json" style="display:none;">
      </div>
    </div>
  `;
}

function renderTabs(){
  let tabs = state.agents.map(a => `
    <button class="tab ${state.view==='agent' && state.currentAgent===a ? 'active':''}" data-action="select-agent" data-agent="${escapeHtml(a)}">${escapeHtml(a)}</button>
  `).join('');
  return `
    <div class="tabs">
      ${tabs}
      <button class="tab-add" data-action="add-agent" title="Agregar agente">+</button>
      <button class="tab team ${state.view==='team' ? 'active':''}" data-action="select-team-view" style="margin-left:auto;">📊 Comparar equipo</button>
    </div>
  `;
}

function renderAgentView(){
  const agent = state.currentAgent;
  if(!agent){
    return `<div class="card"><p class="empty">Agregá tu primer agente con el botón "+" de arriba.</p></div>`;
  }
  const records = state.data[agent].records;
  const gaugeRec = records[state.gaugeDate] || null;
  const gaugeScore = scoreOf(gaugeRec);
  const needleDeg = gaugeScore !== null ? (gaugeScore/10*180 - 90) : -90;
  const pend = totalPendientes(agent);

  const pendDates = Object.entries(records)
    .filter(([fecha, rec]) => fecha < todayStr() && pendientesOf(rec) > 0)
    .sort((a,b) => a[0].localeCompare(b[0]));

  const monthData = monthlyAverage(agent, state.agentMonth);

  const historyRows = Object.entries(records)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .map(([fecha, rec]) => {
      const s = scoreOf(rec);
      const p = pendientesOf(rec);
      return `
        <tr>
          <td>${fmtDate(fecha)}</td>
          <td>${rec.entrantes}</td>
          <td>${rec.mismo_dia}</td>
          <td>${rec.vencido_1d}</td>
          <td>${rec.vencido_2d}</td>
          <td>${p}</td>
          <td><span class="score-pill" style="background:${scoreBg(s)}; color:${scoreColor(s)}">${s===null?'—':s.toFixed(1)}</span></td>
          <td class="row-actions">
            <button class="icon-btn" data-action="delete-record" data-agent="${escapeHtml(agent)}" data-fecha="${fecha}" title="Borrar">🗑</button>
          </td>
        </tr>
      `;
    }).join('');

  return `
    <div class="grid">
      <div class="card gauge-box">
        <h2>Puntaje del día</h2>
        <div class="gauge">
          <div class="gauge-arc"></div>
          <div class="gauge-needle" style="transform: rotate(${needleDeg}deg)"></div>
          <div class="gauge-pivot"></div>
        </div>
        <div class="gauge-labels"><span>0</span><span>5</span><span>10</span></div>
        <div class="gauge-score" style="color:${scoreColor(gaugeScore)}">${gaugeScore===null ? '—' : gaugeScore.toFixed(1)}</div>
        <div class="gauge-tag" style="background:${scoreBg(gaugeScore)}; color:${scoreColor(gaugeScore)}">${scoreLabel(gaugeScore)}</div>
        <div class="gauge-sub">${gaugeRec ? `${gaugeRec.entrantes} leads entraron · ${gaugeRec.mismo_dia} gestionados mismo día` : 'Sin registro para esta fecha'}</div>
        <div class="gauge-date-picker">
          <label>Ver fecha</label>
          <input type="date" id="gauge-date-input" value="${state.gaugeDate}" max="${todayStr()}">
        </div>
      </div>

      <div class="card">
        <h2>Registrar leads de hoy</h2>
        <form id="form-registrar">
          <label>Fecha</label>
          <input type="date" name="fecha" value="${todayStr()}" max="${todayStr()}" required>
          <div class="row2">
            <div>
              <label>Leads entrantes</label>
              <input type="number" name="entrantes" min="0" required>
            </div>
            <div>
              <label>Gestionados mismo día</label>
              <input type="number" name="mismo_dia" min="0" required>
            </div>
          </div>
          <p class="hint">El resto queda como pendiente y aparece abajo para cerrar los días siguientes.</p>
          <button class="btn" type="submit">Guardar registro</button>
        </form>
      </div>
    </div>

    ${pend > 0 ? `
    <div class="card" style="margin-bottom:16px;">
      <div class="card-actions"><h2>Pendientes por cerrar (${pend})</h2></div>
      ${pendDates.map(([fecha, rec]) => {
        const p = pendientesOf(rec);
        const dd = diffDaysFromToday(fecha);
        return `
          <div class="pend-item">
            <div class="pend-info">
              <b>${p} lead${p===1?'':'s'}</b> del ${fmtDate(fecha)}
              <span>${dd===1 ? 'vencido hace 1 día' : `vencido hace ${dd} días`}</span>
            </div>
            <form class="pend-form" data-action="resolver" data-agent="${escapeHtml(agent)}" data-fecha="${fecha}">
              <span style="font-size:12px; color:var(--text-dim)">Gestioné</span>
              <input type="number" name="cantidad" min="1" max="${p}" value="${p}">
              <button class="btn small secondary" type="submit">hoy</button>
            </form>
          </div>
        `;
      }).join('')}
    </div>` : ''}

    <div class="card" style="margin-bottom:16px;">
      <div class="card-actions">
        <h2>Resumen mensual</h2>
        <input type="month" id="agent-month-input" value="${state.agentMonth}" style="width:auto;">
      </div>
      ${monthData ? `
        <div class="month-summary">
          <div class="month-score" style="color:${scoreColor(monthData.avg)}">${monthData.avg.toFixed(1)}</div>
          <div class="month-stats">
            <div class="stat"><b>${monthData.days}</b><span>días con datos</span></div>
            <div class="stat"><b>${monthData.totalEntrantes}</b><span>leads entrantes</span></div>
            <div class="stat"><b>${monthData.totalMismoDia}</b><span>gestionados mismo día</span></div>
            <div class="stat"><b>${monthData.totalEntrantes ? Math.round(monthData.totalMismoDia/monthData.totalEntrantes*100) : 0}%</b><span>tasa mismo día</span></div>
          </div>
        </div>
        <p class="hint" style="margin-top:12px;">${scoreLabel(monthData.avg)} — puntaje final del mes, promedio simple de los puntajes diarios (no pesado por volumen), igual que tu ejemplo de cálculo.</p>
      ` : `<p class="empty">Sin datos cargados para este mes.</p>`}
    </div>

    <div class="card">
      <h2>Historial</h2>
      ${historyRows ? `
      <table>
        <thead><tr>
          <th>Fecha</th><th>Entrantes</th><th>Mismo día</th><th>Vencido 1d</th><th>Vencido +1d</th><th>Pend.</th><th>Puntaje</th><th></th>
        </tr></thead>
        <tbody>${historyRows}</tbody>
      </table>` : `<p class="empty">Todavía no cargaste datos para ${escapeHtml(agent)}. Registrá los leads de hoy para arrancar.</p>`}
    </div>
  `;
}

function renderTeamView(){
  const rows = state.agents.map(agent => {
    const m = monthlyAverage(agent, state.teamMonth);
    return { agent, avg: m ? m.avg : null, days: m ? m.days : 0 };
  }).sort((a,b) => {
    if(a.avg === null) return 1;
    if(b.avg === null) return -1;
    return b.avg - a.avg;
  });

  const best = rows.find(r => r.avg !== null);
  const worst = [...rows].reverse().find(r => r.avg !== null);

  return `
    <div class="card">
      <div class="card-actions">
        <h2>Comparativa del equipo</h2>
        <input type="month" id="team-month-input" value="${state.teamMonth}" style="width:auto;">
      </div>
      ${rows.length === 0 ? '<p class="empty">Todavía no hay agentes cargados.</p>' : rows.map(r => {
        const pct = r.avg !== null ? (r.avg/10*100) : 0;
        let note = '';
        if(r.avg !== null && best && r.agent === best.agent && best.avg >= 7) note = '👏 Mejor desempeño';
        else if(r.avg !== null && worst && r.agent === worst.agent && worst.avg < 4) note = '⚠️ Necesita atención';
        return `
          <div class="team-row">
            <div class="team-name">${escapeHtml(r.agent)}</div>
            <div class="team-bar-track"><div class="team-bar-fill" style="width:${pct}%; background:${scoreColor(r.avg)}"></div></div>
            <div class="team-score" style="color:${scoreColor(r.avg)}">${r.avg===null?'—':r.avg.toFixed(1)}</div>
            <div class="team-note">${r.avg===null ? 'sin datos' : note}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- events ----------
function attachDelegatedEvents(){
  const app = document.getElementById('app');

  app.onclick = async (e) => {
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;
    if(action === 'select-agent') selectAgent(t.dataset.agent);
    else if(action === 'add-agent') await addAgent();
    else if(action === 'select-team-view') selectTeamView();
    else if(action === 'delete-record') await deleteRecord(t.dataset.agent, t.dataset.fecha);
    else if(action === 'export-backup') exportBackup();
    else if(action === 'import-backup') triggerImport();
  };

  app.onsubmit = async (e) => {
    e.preventDefault();
    const form = e.target;
    if(form.id === 'form-registrar'){
      const agent = state.currentAgent;
      const fecha = form.fecha.value;
      const entrantes = parseInt(form.entrantes.value, 10);
      const mismoDia = parseInt(form.mismo_dia.value, 10);
      if(mismoDia > entrantes){ alert('Los gestionados mismo día no pueden ser más que los entrantes.'); return; }
      await registrarHoy(agent, fecha, entrantes, mismoDia);
    } else if(form.dataset.action === 'resolver'){
      const agent = form.dataset.agent;
      const fecha = form.dataset.fecha;
      const cantidad = parseInt(form.cantidad.value, 10);
      await resolverPendiente(agent, fecha, cantidad);
    }
  };

  const gaugeInput = document.getElementById('gauge-date-input');
  if(gaugeInput) gaugeInput.onchange = () => { state.gaugeDate = gaugeInput.value; render(); };

  const agentMonthInput = document.getElementById('agent-month-input');
  if(agentMonthInput) agentMonthInput.onchange = () => { state.agentMonth = agentMonthInput.value; render(); };

  const teamMonthInput = document.getElementById('team-month-input');
  if(teamMonthInput) teamMonthInput.onchange = () => { state.teamMonth = teamMonthInput.value; render(); };

  const importInput = document.getElementById('import-file-input');
  if(importInput) importInput.onchange = (e) => { handleImportFile(e.target.files[0]); e.target.value = ''; };
}

init();
</script>
</body>
</html>
